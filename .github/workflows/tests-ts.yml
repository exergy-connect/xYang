# Lint, build, and test TypeScript.
# Required Checks (TypeScript) always reports on pull requests (skipped when no TS paths changed).

name: Tests (TypeScript)

on:
  push:
    branches: [main]
    paths:
      - "ts/**"
      - "docs/**"
      - ".github/workflows/tests-ts.yml"
      - ".github/workflows/build-ts-dist.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-ts-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      typescript: ${{ steps.detect.outputs.typescript }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect TypeScript-relevant changes
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "typescript=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" | grep -qE '^(ts/|docs/|\.github/workflows/tests-ts\.yml$|\.github/workflows/build-ts-dist\.yml$)'; then
            echo "typescript=true" >> "$GITHUB_OUTPUT"
          else
            echo "typescript=false" >> "$GITHUB_OUTPUT"
          fi

  test:
    name: Node 24
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.typescript == 'true'

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.head_ref || github.ref_name }}

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: ts/package-lock.json

      - name: Install dependencies
        working-directory: ts
        run: npm ci

      - name: Lint (typecheck)
        working-directory: ts
        run: npm run lint

      - name: Build
        working-directory: ts
        run: npm run build:check

      - name: Test
        working-directory: ts
        run: npm test

  required-check:
    name: Required Checks (TypeScript)
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: always()

    steps:
      - name: Report required status
        shell: bash
        run: |
          if [ "${{ needs.changes.outputs.typescript }}" != "true" ]; then
            echo "No TypeScript changes in this pull request."
            exit 0
          fi
          if [[ "${{ needs.test.result }}" != "success" ]]; then
            exit 1
          fi
