# Run the test suite on pushes and PRs that touch library code.
# Matrix: one parallel job per Python version (3.9–3.13).

name: Tests

on:
  push:
    branches: [main, master]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          PY="${{ matrix.python-version }}"
          # pytest 9+ requires Python >= 3.10
          if [ "$PY" = "3.9" ]; then
            pip install "pytest>=8.4.2,<9" "PyYAML>=6.0"
          else
            pip install "pytest>=9.0.3" "PyYAML>=6.0.3"
          fi

      - name: Run tests
        run: pytest --tb=short -q
