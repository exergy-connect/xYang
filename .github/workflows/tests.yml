# Run the test suite on pushes and PRs that touch library code.
# Matrix: one parallel job per Python version (3.10–3.14).
# Required Checks always reports on pull requests (skipped when no Python paths changed).

name: Tests

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "pyproject.toml"
      - ".github/workflows/tests.yml"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      python: ${{ steps.detect.outputs.python }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect Python-relevant changes
        id: detect
        shell: bash
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "python=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if git diff --name-only "${{ github.event.pull_request.base.sha }}...${{ github.event.pull_request.head.sha }}" | grep -qE '^(src/|tests/|pyproject\.toml$|\.github/workflows/tests\.yml$)'; then
            echo "python=true" >> "$GITHUB_OUTPUT"
          else
            echo "python=false" >> "$GITHUB_OUTPUT"
          fi

  pytest:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.python == 'true'
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package and test tools
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -q

  required-check:
    name: Required Checks
    runs-on: ubuntu-latest
    needs: [changes, pytest]
    if: always()

    steps:
      - name: Report required status
        shell: bash
        run: |
          if [ "${{ needs.changes.outputs.python }}" != "true" ]; then
            echo "No Python changes in this pull request."
            exit 0
          fi
          if [[ "${{ needs.pytest.result }}" != "success" ]]; then
            exit 1
          fi
