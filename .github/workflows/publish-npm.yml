# Publish @exergy-connect/xyang to npm when a GitHub Release is published.
#
# One-time npm setup (pick one auth method):
#
# A) Trusted publishing (recommended — no long-lived token in GitHub secrets):
#    https://docs.npmjs.com/trusted-publishers
#    npm → @exergy-connect/xyang → Settings → Trusted Publisher → GitHub Actions
#    - Repository: exergy-connect/xYang  (match casing exactly)
#    - Workflow: publish-npm.yml
#    - Environment: leave empty unless you add `environment:` below
#
# B) Granular access token:
#    Create a token with publish access to @exergy-connect/xyang and add
#    repository secret NPM_TOKEN.
#
# Before each release: tag vX.Y.Z; this workflow sets ts/package.json version
# from the tag. Provenance requires repository.url in package.json (see ts/package.json).

name: Publish npm package

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node 24
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          cache: npm
          cache-dependency-path: ts/package-lock.json

      - name: Set package version from release tag
        if: github.event_name == 'release'
        working-directory: ts
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install dependencies
        working-directory: ts
        run: npm ci

      - name: Build
        working-directory: ts
        run: npm run build

      - name: Verify publish tarball
        working-directory: ts
        run: npm pack --dry-run

      - name: Verify provenance prerequisites
        run: |
          test "${GITHUB_ACTIONS}" = "true" || { echo "::error::Not running in GitHub Actions"; exit 1; }
          test -n "${GITHUB_WORKFLOW}" || { echo "::error::GITHUB_WORKFLOW is unset"; exit 1; }
          test -n "${ACTIONS_ID_TOKEN_REQUEST_URL}" || {
            echo "::error::OIDC id-token unavailable — job needs permissions.id-token: write"
            exit 1
          }
          npm --version
          node --version

      - name: Publish
        working-directory: ts
        run: npm publish --provenance --access public
        env:
          # Omit NODE_AUTH_TOKEN when npm trusted publishing is configured (OIDC only).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
