# Build wheels/sdist and publish to PyPI when a GitHub Release is published.
#
# One-time PyPI setup (Trusted Publishing — no API token in GitHub secrets):
#   https://docs.pypi.org/trusted-publishers/adding-a-publisher/
#   PyPI → xyang project → Settings → Publishing → "Add a new pending publisher"
#   - Owner/repo: this repository
#   - Workflow: publish-pypi.yml
#   - Environment name: leave empty unless you use the optional `environment:` block below
#
# Before each release: bump `version` in pyproject.toml (and setup.py if kept in sync).

name: Publish to PyPI

on:
  release:
    types: [published]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build
        run: python -m pip install --upgrade pip build

      - name: Build sdist and wheel
        run: python -m build

      - uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/

  publish:
    name: Upload to PyPI
    needs: [build]
    runs-on: ubuntu-latest
    # Uncomment and create a GitHub Environment named `pypi` if you configured
    # that name on PyPI's trusted publisher (optional protection rules / reviewers).
    # environment:
    #   name: pypi
    #   url: https://pypi.org/p/xyang
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
