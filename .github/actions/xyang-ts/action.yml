name: xyang-ts
description: >-
  Check out xYang and run the xyang-ts CLI from committed artifacts/xyang-ts.mjs
  (no npm install or build). Use from other repositories to validate YANG modules in CI.

inputs:
  repository:
    description: GitHub repository that hosts xYang
    required: false
    default: exergy-connect/xYang
  ref:
    description: Branch, tag, or SHA of xYang to use
    required: false
    default: main
  path:
    description: Directory to check out xYang into (relative to the workflow workspace)
    required: false
    default: .xyang
  command:
    description: xyang-ts subcommand (parse, validate, convert). Omit to only expose xyang-ts on PATH.
    required: false
    default: ""
  yang-file:
    description: YANG module file path (required when command is set)
    required: false
    default: ""
  data-file:
    description: JSON instance file for validate (optional for parse and convert)
    required: false
    default: ""
  include-path:
    description: Module search directories mapped to --include-path (one path per line)
    required: false
    default: ""
  working-directory:
    description: Working directory for the xyang-ts command
    required: false
    default: ""

outputs:
  cli:
    description: Absolute path to artifacts/xyang-ts.mjs
    value: ${{ steps.setup.outputs.cli }}
  xyang-root:
    description: Absolute path to the xYang repository root
    value: ${{ steps.setup.outputs.xyang-root }}

runs:
  using: composite
  steps:
    - name: Check out xYang
      uses: actions/checkout@v6
      with:
        repository: ${{ inputs.repository }}
        ref: ${{ inputs.ref }}
        path: ${{ inputs.path }}

    - name: Set up Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24"

    - id: setup
      name: Configure xyang-ts
      shell: bash
      run: |
        XYANG_ROOT="${{ github.workspace }}/${{ inputs.path }}"
        CLI="${XYANG_ROOT}/artifacts/xyang-ts.mjs"
        if [ ! -f "$CLI" ]; then
          echo "::error::Missing ${CLI}. Use an xYang ref with committed CI artifacts (main after the build-ts-dist workflow runs)."
          exit 1
        fi
        chmod +x "$CLI"

        BIN_DIR="${RUNNER_TEMP}/xyang-ts-bin"
        mkdir -p "$BIN_DIR"
        {
          echo '#!/usr/bin/env bash'
          echo "exec node \"${CLI}\" \"\$@\""
        } > "${BIN_DIR}/xyang-ts"
        chmod +x "${BIN_DIR}/xyang-ts"
        echo "${BIN_DIR}" >> "$GITHUB_PATH"

        echo "cli=${CLI}" >> "$GITHUB_OUTPUT"
        echo "xyang-root=${XYANG_ROOT}" >> "$GITHUB_OUTPUT"

    - name: Run xyang-ts
      if: inputs.command != ''
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        INCLUDE_PATHS: ${{ inputs.include-path }}
      run: |
        set -euo pipefail

        if [ -z "${{ inputs.yang-file }}" ]; then
          echo "::error::yang-file is required when command is set"
          exit 1
        fi

        cmd_args=()

        if [ -n "$INCLUDE_PATHS" ]; then
          while IFS= read -r dir || [ -n "$dir" ]; do
            [ -z "$dir" ] && continue
            cmd_args+=(--include-path "$dir")
          done <<< "$INCLUDE_PATHS"
        fi

        cmd_args+=("${{ inputs.yang-file }}")

        if [ -n "${{ inputs.data-file }}" ]; then
          cmd_args+=("${{ inputs.data-file }}")
        fi

        xyang-ts ${{ inputs.command }} "${cmd_args[@]}"
